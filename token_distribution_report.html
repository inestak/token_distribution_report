<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Token Distribution — Ontology Alignment (All Literals)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1e242d;--surface3:#252d38;
  --border:#30363d;--border2:#3d444d;
  --text:#e6edf3;--muted:#7d8590;--muted2:#5a6270;
  --green:#3fb950;--blue:#58a6ff;--amber:#d29922;
  --red:#f85149;--purple:#bc8cff;--teal:#39d0b3;--pink:#ff7eb3;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh}
header{padding:20px 40px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:20px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
header .sub{font-size:12px;color:var(--muted);font-family:var(--mono);background:var(--surface2);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}
.badge-all{font-size:11px;background:rgba(57,208,179,.12);color:var(--teal);border:1px solid rgba(57,208,179,.3);padding:2px 10px;border-radius:20px;font-family:var(--mono)}

.tabs{display:flex;gap:2px;padding:0 40px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tab{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);background:transparent;border:none;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--blue)}

.panel{display:none;padding:28px 40px 48px}
.panel.active{display:block}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.stat .val{font-size:24px;font-weight:600;font-family:var(--mono);line-height:1}
.stat.c-green .val{color:var(--green)}
.stat.c-blue  .val{color:var(--blue)}
.stat.c-amber .val{color:var(--amber)}
.stat.c-red   .val{color:var(--red)}
.stat.c-purple .val{color:var(--purple)}
.stat.c-teal  .val{color:var(--teal)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
.card h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.row2,.row3{grid-template-columns:1fr}}
.chart-wrap{position:relative;height:230px}

/* threshold simulator */
.thr-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:20px}
.thr-card h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:16px}
.slider-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.slider-row label{font-size:13px;color:var(--muted);min-width:180px}
input[type=range]{flex:1;accent-color:var(--blue);cursor:pointer}
.thr-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--blue);min-width:28px}
.recall-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.bar-bg{background:var(--surface2);border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:600;color:#0d1117;transition:width .35s ease,background .35s}

/* pair tables */
.tbl-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.tbl-card h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:14px 18px 12px;border-bottom:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:9px 16px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted2);border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:8px 16px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.tok{display:inline-block;font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:3px;margin:1px 1px 1px 0}
.tok-c{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.tok-d{background:rgba(125,133,144,.08);color:var(--muted);border:1px solid var(--border)}
.num{font-family:var(--mono);font-weight:500;color:var(--blue)}
.jnum{font-family:var(--mono);font-size:11px;color:var(--purple)}

/* props table */
.prop-bar-bg{background:var(--surface2);border-radius:3px;height:12px;overflow:hidden;min-width:80px}
.prop-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.prop-name{font-family:var(--mono);font-size:11px;color:var(--teal)}

/* overview */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:24px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 20px;cursor:pointer;transition:border-color .15s}
.ov-card:hover{border-color:var(--blue)}
.ov-card h4{font-size:14px;font-weight:600;margin-bottom:12px}
.ov-stats{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:10px}
.ov-stat .ol{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.ov-stat .ov{font-size:18px;font-weight:600;font-family:var(--mono)}
.mini-bar-bg{background:var(--surface2);border-radius:3px;height:5px;margin-top:8px}
.mini-bar-fill{height:100%;border-radius:3px}
.note{font-size:11px;color:var(--muted2);margin-top:5px}

.tokenize-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.8}
.tokenize-box span{color:var(--teal)}
</style>
</head>

function renderTokens(tokens, commonSet) {
  return tokens.map(t => {
    const cls = commonSet.has(t) ? 'tok-c' : 'tok-d';
    return `<span class="tok ${cls}">${t}</span>`;
  }).join('');
}

function fmtPairRows(pairs, thr) {
  return pairs.map(r => {
    const cs = new Set(r.common);
    const srcH = renderTokens(r.src_tokens, cs);
    const tgtH = renderTokens(r.tgt_tokens, cs);
    const numEl = r.common_count >= thr
      ? `<span class="num">${r.common_count}</span>`
      : `<span class="num" style="color:var(--red)">${r.common_count}</span>`;
    return `<tr>
      <td style="max-width:240px">${srcH}<br><span style="font-size:10px;color:var(--muted2)">${r.src}</span></td>
      <td style="max-width:240px">${tgtH}<br><span style="font-size:10px;color:var(--muted2)">${r.tgt}</span></td>
      <td style="text-align:center">${numEl}</td>
      <td class="jnum">${r.jaccard}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:18px">Aucune paire</td></tr>`;
}

function makeBarChart(canvasId, dist, color) {
  const maxBin = Math.max(...Object.keys(dist).map(Number), 5);
  const bins = Array.from({length: maxBin + 1}, (_, i) => i);
  const counts = bins.map(b => dist[b] ?? 0);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: bins.map(String),
      datasets: [{
        data: counts,
        backgroundColor: bins.map(b => b === 0 ? 'rgba(248,81,73,0.55)' : color + 'bb'),
        borderColor: bins.map(b => b === 0 ? '#f85149' : color),
        borderWidth: 1.5, borderRadius: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {display: false},
        tooltip: {
          backgroundColor:'#1e242d',borderColor:'#30363d',borderWidth:1,
          titleColor:'#e6edf3',bodyColor:'#7d8590',
          callbacks: {
            title: i => `${i[0].label} token(s) commun(s)`,
            label: i => ` ${i.raw} paire(s)`
          }
        }
      },
      scales: {
        x:{ticks:{color:'#7d8590',autoSkip:false},grid:{color:'rgba(48,54,61,0.5)'},
          title:{display:true,text:'tokens communs',color:'#5a6270',font:{size:10}}},
        y:{ticks:{color:'#7d8590',precision:0},grid:{color:'rgba(48,54,61,0.5)'},
          beginAtZero:true,title:{display:true,text:'paires',color:'#5a6270',font:{size:10}}}
      }
    }
  });
}

function updateThr(idx, recallMap, total) {
  const val = parseInt(document.getElementById(`thr_${idx}`).value);
  document.getElementById(`thrval_${idx}`).textContent = val;
  const pct = recallMap[val] ?? 0;
  const kept = Math.round(pct / 100 * total);
  const rejPct = Math.round((100 - pct) * 10) / 10;
  const rejected = total - kept;

  const fillEl = document.getElementById(`bar_${idx}`);
  fillEl.style.width = pct + '%';
  fillEl.textContent = pct + '%';
  fillEl.style.background = pct > 70 ? 'var(--green)' : pct > 40 ? 'var(--amber)' : 'var(--red)';
  document.getElementById(`rc_kept_${idx}`).textContent = `${kept.toLocaleString()} / ${total.toLocaleString()} paires (${pct}%)`;

  const fillRej = document.getElementById(`bar_rej_${idx}`);
  fillRej.style.width = rejPct + '%';
  fillRej.textContent = rejPct + '%';
  fillRej.style.background = rejPct > 30 ? 'var(--red)' : 'var(--amber)';
  document.getElementById(`rc_rej_${idx}`).textContent = `${rejected.toLocaleString()} rejetées (${rejPct}%)`;

  const topBody = document.getElementById(`top_body_${idx}`);
  if (topBody) topBody.innerHTML = fmtPairRows(DATA[idx].top_pairs, val);
  const edgeBody = document.getElementById(`edge_body_${idx}`);
  if (edgeBody) edgeBody.innerHTML = fmtPairRows(DATA[idx].edge_pairs, val);
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-id="${id}"]`).classList.add('active');
  document.getElementById(id).classList.add('active');
}

  const cards = DATA.map((d, i) => `
    <div class="ov-card" onclick="switchTab('onto-${i}')">
      <h4 style="color:${PAL[i % PAL.length]}">${d.name}</h4>
      <div class="ov-stats">
        <div class="ov-stat"><div class="ol">Paires</div><div class="ov" style="color:${PAL[i%PAL.length]}">${d.total.toLocaleString()}</div></div>
        <div class="ov-stat"><div class="ol">Avg communs</div><div class="ov">${d.avg_common}</div></div>
        <div class="ov-stat"><div class="ol">0 commun</div><div class="ov" style="color:var(--red)">${d.zero_pct}%</div></div>
        <div class="ov-stat"><div class="ol">Jaccard moy.</div><div class="ov" style="color:var(--purple)">${d.avg_jaccard}</div></div>
      </div>
      <div class="note" style="margin-bottom:4px">Props littérales : <b style="color:var(--teal)">${d.n_props}</b> &nbsp;|&nbsp; Recall@≥1 : <b>${d.recall_by_thr['1'] ?? 0}%</b></div>
      <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${d.recall_by_thr['1'] ?? 0}%;background:${PAL[i%PAL.length]}"></div></div>
    </div>`).join('');

  return `
    <div class="tokenize-box">
      tokenize(literal) &nbsp;=&nbsp; <span>re.findall(r'[a-z0-9]+', literal.lower())</span><br>
      Toutes les propriétés littérales sont utilisées : <span>rdfs:label, skos:prefLabel, skos:altLabel, oboInOwl:hasExactSynonym, ...</span><br>
      Les tokens d'une entité = <span>union</span> de tous les tokens de tous ses littéraux.
    </div>
    <div class="ov-grid">${cards}</div>
    <div class="card">
      <h3>Distribution comparative — tokens communs (toutes ontologies)</h3>
      <div class="chart-wrap" style="height:300px">
        <canvas id="ov_chart"></canvas>
      </div>
    </div>`;
}

/* ── Per-ontology panel ── */
function buildPanel(d, idx) {
  const col = PAL[idx % PAL.length];
  const maxThr = Math.max(...Object.keys(d.recall_by_thr).map(Number));
  const missNote = d.missing_label > 0
    ? `<div style="font-size:12px;color:var(--amber);margin-bottom:12px">⚠ ${d.missing_label} paires avec fallback URI (entité absente des OWL)</div>`
    : '';

  // Props table rows
  const maxTok = d.top_props[0]?.token_count ?? 1;
  const propsRows = d.top_props.map(p => {
    const pct = Math.round(p.token_count / maxTok * 100);
    return `<tr>
      <td class="prop-name">${p.name}</td>
      <td><div class="prop-bar-bg"><div class="prop-bar-fill" style="width:${pct}%;background:var(--teal)"></div></div></td>

      <td style="font-family:var(--mono);font-size:12px;color:var(--blue);text-align:right">${p.uri_count.toLocaleString()}</td>
    </tr>`;
  }).join('');

  return `
  <div class="stat-grid">
    <div class="stat c-blue">  <div class="lbl">Paires test</div>     <div class="val">${d.total.toLocaleString()}</div></div>
    <div class="stat c-teal">  <div class="lbl">Props littérales</div> <div class="val">${d.n_props}</div></div>
    <div class="stat c-green"> <div class="lbl">Avg tokens communs</div><div class="val">${d.avg_common}</div></div>
    <div class="stat c-purple"><div class="lbl">Jaccard moyen</div>    <div class="val">${d.avg_jaccard}</div></div>
    <div class="stat c-red">   <div class="lbl">0 token commun</div>   <div class="val">${d.zero_pct}%</div></div>
    <div class="stat c-amber"> <div class="lbl">Max tokens communs</div><div class="val">${d.max_common}</div></div>
  </div>
  ${missNote}

  <div class="row3">
    <div class="card">
      <h3>Tokens communs — distribution</h3>
      <div class="chart-wrap"><canvas id="ch_${idx}"></canvas></div>
    </div>
    <div class="card">
      <h3>Jaccard — distribution</h3>
      <div class="chart-wrap"><canvas id="jac_${idx}"></canvas></div>
    </div>
    <div class="card">
      <h3>Propriétés (top 12) — contribution tokens</h3>
      <div class="chart-wrap" style="height:230px"><canvas id="props_ch_${idx}"></canvas></div>
    </div>
  </div>

  <div class="tbl-card" style="margin-bottom:20px">
    <h3>Propriétés littérales — contribution par balise (src + tgt)</h3>

  updateThr(i, d.recall_by_thr, d.total);
});

// Overview grouped chart
const maxBinAll = Math.max(...DATA.map(d => Math.max(...Object.keys(d.dist).map(Number))));
const binsAll = Array.from({length: maxBinAll + 1}, (_, i) => i);
const ovCtx = document.getElementById('ov_chart');
if (ovCtx) {
  new Chart(ovCtx, {
    type: 'bar',
    data: {
      labels: binsAll.map(String),
      datasets: DATA.map((d, i) => ({
        label: d.name,
        data: binsAll.map(b => d.dist[b] ?? 0),
        backgroundColor: PAL[i % PAL.length] + '99',
        borderColor: PAL[i % PAL.length],
        borderWidth: 1.5, borderRadius: 3,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend:{labels:{color:'#7d8590',font:{size:11},boxWidth:12}},
        tooltip:{mode:'index',intersect:false,
          backgroundColor:'#1e242d',borderColor:'#30363d',borderWidth:1,
          titleColor:'#e6edf3',bodyColor:'#7d8590'}
      },
      scales: {
        x:{ticks:{color:'#7d8590',autoSkip:false},grid:{color:'rgba(48,54,61,0.5)'},
          title:{display:true,text:'tokens communs',color:'#5a6270',font:{size:10}}},
        y:{ticks:{color:'#7d8590',precision:0},grid:{color:'rgba(48,54,61,0.5)'},beginAtZero:true}
      }
    }
  });
}
</script>
